<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../Assets/css/Participante/selec_archivo.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../../Assets/js/selec_archivo.js"></script>
    <title>Seleccionar Archivo</title>
</head>
<body>
    <div class="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Seleccionar Archivo</h5>
              </div>
              <div class="modal-body">  
                    <label class="texto-label">Archivo seleccionado</label>   
                 <div class="input-file"> 
                    <label for="" class="form-label"></label>
                    <input class="form-control" type="file" name="file" id="file"> 
                    <label class="btn-select" for="file">Seleccionar Archivo</label>   
                  </div>
                </div>
              <div class="modal-footer">
                <button type="button" class="btncancelar" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btnaceptar" data-bs-dismiss="modal">Aceptar</button>
              </div>
            </div>
        </div>
    </div>

</body>
</html>
