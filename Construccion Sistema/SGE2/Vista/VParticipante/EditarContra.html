<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../Assets/css/Participante/editar_contra.css">
    <title>Cuenta</title>
</head>
<body>
    <div class="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Editar Contraseña</h5>
              </div>
              <div class="modal-body">
                <div class="grupo">            
                    <input type="password" name="pass" id="pass" required>
                    <label>Contraseña</label>
                </div> 
                <div class="grupo">
                    <input type="password" name="npass" id="npass" required>
                    <label>Nueva contraseña</label>
                </div>  
                <div class="grupo">
                    <input type="password" name="cpass" id="cpass" required>
                    <label>Confirmar contraseña</label>
                </div>  
              </div>
              <div class="modal-footer">
                <button type="button" class="btncancelar" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btnguardar" data-bs-dismiss="modal">Guardar cambios</button>
              </div>
            </div>
        </div>
    </div>
</body>
</html>
